name: Meridian Health Application Security Hardening

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # GATE 1: Secrets Detection (runs first — critical risk)
  secret-scanning:
    name: TruffleHog Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog Secrets Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: ${{ github.ref_name }}
          extra_args: --debug

  # GATE 2: SAST (runs second — code vulnerabilities)
  sast-scanning:
    name: Bandit SAST Scan
    runs-on: ubuntu-latest
    needs: secret-scanning
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit SAST
        run: |
          bandit -r app/ -ll -ii -f txt
        # -ll = only HIGH severity, -ii = only HIGH confidence
        # Change to -l -i to also catch MEDIUM (more verbose)

  # GATE 3: Dependency Scanning (runs last)
  dependency-scanning:
    name: pip-audit Dependency Scan
    runs-on: ubuntu-latest
    needs: sast-scanning
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit -r app/requirements.txt